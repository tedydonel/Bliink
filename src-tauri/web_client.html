<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bliink</title>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #131a26;
    --surface-2: #1a2332;
    --border: #232d3f;
    --fg: #e5ecf5;
    --muted: #76859a;
    --accent: #38bdf8;
    --accent-dim: rgba(56, 189, 248, 0.12);
    --success: #34d399;
    --danger: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    overscroll-behavior: none;
  }
  .hidden { display: none !important; }

  /* ── Login ── */
  #login {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
  }
  .logo {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .login-card p.sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .field { text-align: left; margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    height: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg);
    font-size: 15px;
    padding: 0 12px;
    outline: none;
  }
  .field input:focus { border-color: var(--accent); }
  #code { letter-spacing: 0.4em; font-size: 20px; text-align: center; font-weight: 700; }
  .btn {
    width: 100%;
    height: 44px;
    background: var(--accent);
    color: #06121f;
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 6px;
  }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

  /* ── Chat ── */
  #chat { height: 100%; display: flex; flex-direction: column; max-width: 760px; margin: 0 auto; }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid rgba(56,189,248,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-weight: 800; font-size: 15px;
    flex-shrink: 0;
  }
  header .info { min-width: 0; flex: 1; }
  header .name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot.on { background: var(--success); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .msg { max-width: 78%; display: flex; flex-direction: column; }
  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 9px 13px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.45;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .mine .bubble { background: var(--accent); color: #06121f; border-bottom-right-radius: 5px; }
  .theirs .bubble { background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
  .meta { font-size: 10.5px; color: var(--muted); margin-top: 3px; display: flex; gap: 5px; align-items: center; }
  .ticks { font-size: 11px; }
  .ticks.read { color: var(--accent); }
  .bubble img { max-width: 100%; max-height: 320px; border-radius: 10px; display: block; }
  .bubble.media { padding: 4px; background: var(--surface-2); border: 1px solid var(--border); }
  .mine .bubble.media { background: var(--surface-2); }
  .bubble audio { width: 240px; max-width: 100%; display: block; }
  .filecard {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: var(--fg);
    padding: 6px 8px;
  }
  .filecard .ficon {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--accent-dim); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .filecard .fname { font-size: 13.5px; font-weight: 600; word-break: break-all; }
  .filecard .fsize { font-size: 11.5px; color: var(--muted); }
  .uploading { opacity: 0.65; }
  .progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; width: 160px; }
  .progress > div { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }

  #typing { padding: 0 16px 6px; font-size: 12px; color: var(--accent); min-height: 22px; }

  footer {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .iconbtn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .iconbtn:hover { color: var(--fg); }
  #input {
    flex: 1;
    min-height: 42px;
    max-height: 120px;
    resize: none;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 21px;
    color: var(--fg);
    font-family: inherit;
    font-size: 14.5px;
    padding: 10px 16px;
    outline: none;
    line-height: 1.4;
  }
  #input:focus { border-color: var(--accent); }
  #send { background: var(--accent); color: #06121f; border: none; }
  #send:hover { color: #06121f; opacity: 0.9; }

  #drop-overlay {
    position: fixed; inset: 0;
    background: rgba(56,189,248,0.12);
    border: 3px dashed var(--accent);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--accent);
    pointer-events: none;
  }
  .day-sep {
    align-self: center;
    font-size: 11px; font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 0 4px;
  }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="logo">⚡ Bliink</div>
    <p class="sub">Enter the code shown in the Bliink app to connect</p>
    <div class="field">
      <label>Your name</label>
      <input id="name" type="text" placeholder="e.g. Ted's phone" maxlength="40" />
    </div>
    <div class="field">
      <label>Access code</label>
      <input id="code" type="text" inputmode="numeric" placeholder="000000" maxlength="6" autocomplete="one-time-code" />
    </div>
    <button class="btn" id="connect">Connect</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div id="chat" class="hidden">
  <header>
    <div class="avatar" id="host-avatar">B</div>
    <div class="info">
      <div class="name" id="host-name">Bliink</div>
      <div class="status"><span class="dot" id="conn-dot"></span><span id="conn-text">Connecting…</span></div>
    </div>
  </header>
  <div id="messages"></div>
  <div id="typing"></div>
  <footer>
    <button class="iconbtn" id="attach" title="Send files">📎</button>
    <input type="file" id="file-input" multiple class="hidden" />
    <textarea id="input" rows="1" placeholder="Message"></textarea>
    <button class="iconbtn" id="send" title="Send">➤</button>
  </footer>
</div>

<div id="drop-overlay" class="hidden">Drop files to send</div>

<script>
(function () {
  var token = localStorage.getItem("bliink-token") || "";
  var hostName = localStorage.getItem("bliink-host") || "Bliink";
  var ws = null;
  var wsTimer = null;
  var typingTimer = null;
  var sentTyping = false;
  var rendered = {}; // message id -> element
  var lastDay = "";

  var $ = function (id) { return document.getElementById(id); };

  function fmtBytes(n) {
    if (!n) return "0 B";
    var u = ["B", "KB", "MB", "GB"]; var i = Math.floor(Math.log(n) / Math.log(1024));
    i = Math.min(i, u.length - 1);
    return (n / Math.pow(1024, i)).toFixed(i ? 1 : 0) + " " + u[i];
  }
  function fmtTime(ts) {
    var d = new Date(ts);
    return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
  }
  function dayLabel(ts) {
    var d = new Date(ts), now = new Date();
    if (d.toDateString() === now.toDateString()) return "Today";
    var y = new Date(now); y.setDate(y.getDate() - 1);
    if (d.toDateString() === y.toDateString()) return "Yesterday";
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function esc(s) {
    var div = document.createElement("div");
    div.textContent = s;
    return div.innerHTML;
  }

  // ── Login ──
  $("connect").addEventListener("click", doAuth);
  $("code").addEventListener("keydown", function (e) { if (e.key === "Enter") doAuth(); });
  $("name").addEventListener("keydown", function (e) { if (e.key === "Enter") $("code").focus(); });

  function doAuth() {
    var name = $("name").value.trim() || "Web user";
    var code = $("code").value.trim();
    if (code.length !== 6) { $("login-error").textContent = "Enter the 6-digit code"; return; }
    $("connect").disabled = true;
    fetch("/api/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: code, name: name }),
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        $("connect").disabled = false;
        if (!res.ok) { $("login-error").textContent = res.j.error || "Connection failed"; return; }
        token = res.j.token;
        hostName = res.j.hostName || "Bliink";
        localStorage.setItem("bliink-token", token);
        localStorage.setItem("bliink-host", hostName);
        enterChat();
      })
      .catch(function () {
        $("connect").disabled = false;
        $("login-error").textContent = "Could not reach the Bliink app";
      });
  }

  function enterChat() {
    $("login").classList.add("hidden");
    $("chat").classList.remove("hidden");
    $("host-name").textContent = hostName;
    $("host-avatar").textContent = (hostName[0] || "B").toUpperCase();
    loadHistory();
    connectWs();
  }

  function loadHistory() {
    fetch("/api/messages?token=" + encodeURIComponent(token))
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (msgs) {
        msgs.forEach(function (m) { renderMessage(m); });
        scrollDown(true);
        markHostRead();
      })
      .catch(function () { logout(); });
  }

  function logout() {
    localStorage.removeItem("bliink-token");
    token = "";
    $("chat").classList.add("hidden");
    $("login").classList.remove("hidden");
    if (ws) try { ws.close(); } catch (e) {}
  }

  // ── WebSocket ──
  function connectWs() {
    if (!token) return;
    var proto = location.protocol === "https:" ? "wss://" : "ws://";
    ws = new WebSocket(proto + location.host + "/api/ws?token=" + encodeURIComponent(token));
    ws.onopen = function () { setConn(true); };
    ws.onclose = function () {
      setConn(false);
      ws = null;
      if (token) wsTimer = setTimeout(connectWs, 3000);
    };
    ws.onmessage = function (e) {
      var data;
      try { data = JSON.parse(e.data); } catch (err) { return; }
      if (data.type === "message") {
        renderMessage(data.message);
        scrollDown(false);
        if (data.message.direction === "out" && document.hasFocus()) {
          sendWs({ type: "read", ids: [data.message.id] });
        }
      } else if (data.type === "typing") {
        $("typing").textContent = data.typing ? hostName + " is typing…" : "";
      } else if (data.type === "read") {
        (data.ids || []).forEach(function (id) {
          var el = rendered[id];
          if (el) {
            var t = el.querySelector(".ticks");
            if (t) { t.textContent = "✓✓"; t.classList.add("read"); }
          }
        });
      }
    };
  }
  function sendWs(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }
  function setConn(on) {
    $("conn-dot").className = "dot" + (on ? " on" : "");
    $("conn-text").textContent = on ? "Connected" : "Reconnecting…";
  }
  window.addEventListener("focus", markHostRead);
  function markHostRead() {
    var ids = [];
    document.querySelectorAll(".msg.theirs[data-id]").forEach(function (el) {
      if (!el.dataset.readSent) { el.dataset.readSent = "1"; ids.push(el.dataset.id); }
    });
    if (ids.length) sendWs({ type: "read", ids: ids });
  }

  // ── Rendering ──
  function renderMessage(m) {
    if (rendered[m.id]) {
      // status update for an existing message
      var t = rendered[m.id].querySelector(".ticks");
      if (t && m.direction === "in") {
        if (m.status === "read") { t.textContent = "✓✓"; t.classList.add("read"); }
      }
      return;
    }
    var mine = m.direction === "in"; // host's "in" = sent by this browser
    var day = dayLabel(m.createdAt);
    if (day !== lastDay) {
      lastDay = day;
      var sep = document.createElement("div");
      sep.className = "day-sep";
      sep.textContent = day;
      $("messages").appendChild(sep);
    }

    var wrap = document.createElement("div");
    wrap.className = "msg " + (mine ? "mine" : "theirs");
    wrap.dataset.id = m.id;

    var bubble = document.createElement("div");
    bubble.className = "bubble";

    if (m.attachmentKind) {
      bubble.classList.add("media");
      var url = "/api/attachments/" + m.id + "?token=" + encodeURIComponent(token);
      if (m.attachmentKind === "image") {
        bubble.innerHTML = '<a href="' + url + '" target="_blank"><img src="' + url + '" alt="" /></a>';
      } else if (m.attachmentKind === "voice") {
        bubble.innerHTML = '<audio controls preload="metadata" src="' + url + '"></audio>';
      } else {
        bubble.innerHTML =
          '<a class="filecard" href="' + url + '" download>' +
          '<span class="ficon">📄</span>' +
          '<span><span class="fname">' + esc(m.attachmentName || "File") + "</span><br/>" +
          '<span class="fsize">' + fmtBytes(m.attachmentSize || 0) + "</span></span></a>";
      }
    } else {
      bubble.innerHTML = esc(m.text || "");
    }

    var meta = document.createElement("div");
    meta.className = "meta";
    var ticksHtml = "";
    if (mine) {
      var read = m.status === "read";
      ticksHtml = '<span class="ticks' + (read ? " read" : "") + '">' + (read ? "✓✓" : "✓") + "</span>";
    }
    meta.innerHTML = fmtTime(m.createdAt) + ticksHtml;

    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    $("messages").appendChild(wrap);
    rendered[m.id] = wrap;
  }

  function scrollDown(force) {
    var el = $("messages");
    var nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 160;
    if (force || nearBottom) el.scrollTop = el.scrollHeight;
  }

  // ── Sending ──
  $("send").addEventListener("click", sendText);
  $("input").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  $("input").addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
    if (!sentTyping) { sentTyping = true; sendWs({ type: "typing", typing: true }); }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function () {
      sentTyping = false;
      sendWs({ type: "typing", typing: false });
    }, 2000);
  });

  function sendText() {
    var text = $("input").value.trim();
    if (!text) return;
    $("input").value = "";
    $("input").style.height = "auto";
    sentTyping = false;
    sendWs({ type: "typing", typing: false });
    fetch("/api/messages?token=" + encodeURIComponent(token), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text }),
    })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); })
      .then(function (m) { renderMessage(m); scrollDown(true); })
      .catch(function () { alert("Failed to send — is the Bliink app still running?"); });
  }

  // ── Files ──
  $("attach").addEventListener("click", function () { $("file-input").click(); });
  $("file-input").addEventListener("change", function () {
    sendFiles(Array.prototype.slice.call(this.files));
    this.value = "";
  });

  var dragDepth = 0;
  document.addEventListener("dragenter", function (e) {
    e.preventDefault();
    if (++dragDepth === 1) $("drop-overlay").classList.remove("hidden");
  });
  document.addEventListener("dragleave", function (e) {
    e.preventDefault();
    if (--dragDepth <= 0) { dragDepth = 0; $("drop-overlay").classList.add("hidden"); }
  });
  document.addEventListener("dragover", function (e) { e.preventDefault(); });
  document.addEventListener("drop", function (e) {
    e.preventDefault();
    dragDepth = 0;
    $("drop-overlay").classList.add("hidden");
    if (e.dataTransfer && e.dataTransfer.files.length) {
      sendFiles(Array.prototype.slice.call(e.dataTransfer.files));
    }
  });

  function sendFiles(files) {
    files.reduce(function (chain, file) {
      return chain.then(function () { return uploadFile(file); });
    }, Promise.resolve());
  }

  function uploadFile(file) {
    return new Promise(function (resolve) {
      // placeholder bubble with progress
      var wrap = document.createElement("div");
      wrap.className = "msg mine uploading";
      wrap.innerHTML =
        '<div class="bubble media"><div class="filecard"><span class="ficon">📤</span>' +
        '<span><span class="fname">' + esc(file.name) + '</span><br/>' +
        '<span class="fsize">' + fmtBytes(file.size) + '</span>' +
        '<div class="progress"><div></div></div></span></div></div>';
      $("messages").appendChild(wrap);
      scrollDown(true);
      var bar = wrap.querySelector(".progress > div");

      var fd = new FormData();
      fd.append("file", file);
      var xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/attachments?token=" + encodeURIComponent(token));
      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) bar.style.width = ((e.loaded / e.total) * 100).toFixed(1) + "%";
      };
      xhr.onload = function () {
        wrap.remove();
        if (xhr.status === 200) {
          try { renderMessage(JSON.parse(xhr.responseText)); } catch (e) {}
          scrollDown(true);
        } else {
          alert("Upload failed: " + esc(file.name));
        }
        resolve();
      };
      xhr.onerror = function () {
        wrap.remove();
        alert("Upload failed: " + esc(file.name));
        resolve();
      };
      xhr.send(fd);
    });
  }

  // ── Boot: token reuse ──
  if (token) {
    fetch("/api/messages?token=" + encodeURIComponent(token))
      .then(function (r) {
        if (r.ok) { enterChat(); }
        else { localStorage.removeItem("bliink-token"); }
      })
      .catch(function () {});
  }
})();
</script>
</body>
</html>
